<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ app_name }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0;
           display: flex; flex-direction: column; min-height: 100vh;
           align-items: center; justify-content: center; }
    .logo { font-size: 2.5rem; font-weight: 700; color: #63b3ed; margin-bottom: 0.5rem; }
    .sub  { font-size: 1rem; color: #718096; margin-bottom: 2rem; }
    .btn  { background: #3182ce; color: #fff; border: none; padding: 0.75rem 2rem;
            border-radius: 6px; font-size: 1rem; cursor: pointer; text-decoration: none; }
    .btn:hover { background: #2b6cb0; }
  </style>
</head>
<body>
  <div class="logo">⚡ {{ app_name }}</div>
  <div class="sub">Internal Service Metrics Dashboard</div>
  <a class="btn" href="/dashboard">Open Dashboard</a>
</body>
</html>
